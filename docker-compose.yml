services:
  nas-subtitle:
    image: aexachao/nas-subtitle-manager:latest
    container_name: nas-submaster
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/data
      - /your/media/path:/media/movies  # 修改成你自己的媒体库地址
      - /var/run/docker.sock:/var/run/docker.sock  # 自更新功能需要
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - HF_ENDPOINT=https://hf-mirror.com
      # Whisper 设备：auto = 优先 GPU，CUDA 不可用时回退 CPU；也可填 cpu / cuda
      - WHISPER_DEVICE=auto
    shm_size: 4gb
    networks:
      - subtitle-network

networks:
  subtitle-network:
    driver: bridge
